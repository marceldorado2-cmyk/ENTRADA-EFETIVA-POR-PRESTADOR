    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --cyan: #00f0ff;
    --green: #00e676;
    --purple: #b44dff;
    --pink: #ff4d8a;
    --orange: #ffaa3c;
    --yellow: #ffd166;
    --red: #ff5c5c;

    background-image:

      radial-gradient(ellipse at 100% 100%, rgba(0,230,118,0.04) 0%, transparent 45%);
    font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 28px 36px;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;
    margin-bottom: 26px;
  }
  .header-brand { display:flex; align-items:center; gap:16px; }
  .logo-icon {
    width:52px; height:52px; border-radius:12px;
    background: linear-gradient(135deg, #00f0ff, #00e676);
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    box-shadow: 0 0 24px rgba(0,240,255,0.25);
  }
  .title-block h1 {
    font-size:26px; font-weight:800; color:#f8fafc; letter-spacing:-0.5px;
  }
  .title-block span {
    font-size:13px; color: var(--text-muted);
  }
  .live-badge {
    padding:9px 18px; border-radius:30px; font-size:12px; font-weight:800;
    letter-spacing:1.5px; border:1px solid rgba(0,230,118,0.5);
    background:rgba(0,230,118,0.12); color:var(--green);
    display:flex; align-items:center; gap:8px;
  }
  .live-badge::before {
    content:''; width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 10px var(--green);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.85); }
  }

  /* FILTROS */
  .filter-bar {
    display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:26px; flex-wrap:wrap;
  }
  .filter-btn {
    padding:8px 18px; border-radius:20px; font-size:12px; font-weight:600;
    background: rgba(255,255,255,0.05); border:1px solid var(--border-subtle);
    color: var(--text-secondary); cursor:pointer; transition:all 0.2s;
    font-family:inherit;
  }
  .filter-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
  .filter-btn.active {
    background: rgba(0,240,255,0.15); border-color: var(--cyan); color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,240,255,0.15);
  }
  .filter-status {
    width:100%; text-align:center; font-size:12px; color: var(--text-muted); margin-top:4px;
  }
  .filter-status strong { color: var(--cyan); font-weight:600; }

  /* KPIs */
  .kpi-grid {
    display:grid; grid-template-columns:repeat(5, 1fr); gap:18px; margin-bottom:20px;
  }
  @media(max-width:1100px){ .kpi-grid { grid-template-columns:repeat(3,1fr); } }
  @media(max-width:700px){ .kpi-grid { grid-template-columns:1fr; } }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 22px 24px;
    position:relative; overflow:hidden;
    transition: all 0.25s ease;
  }
  .kpi-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.35);
  }
  .kpi-card::after {
    content:''; position:absolute; top:0; right:0; width:90px; height:90px;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
    border-radius:50%;
  }

  .kpi-header {
    display:flex; align-items:center; gap:8px; font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:1.2px; color: var(--text-muted); margin-bottom:10px;
  }
  .kpi-value {
    font-size:32px; font-weight:900; letter-spacing:-1px; margin-bottom:6px;
  }
  .kpi-value .currency { font-size:20px; font-weight:700; margin-right:4px; }
  .kpi-cyan { color: var(--cyan); }
  .kpi-green { color: var(--green); }
  .kpi-purple { color: var(--purple); }
  .kpi-pink { color: var(--pink); }
  .kpi-orange { color: var(--orange); }
  .kpi-desc {
    font-size:12px; color: var(--text-muted); line-height:1.5;
  }
  .kpi-sub {
    font-size:11px; color: var(--text-muted); margin-top:2px;
  }

  /* CHARTS */
  .charts-grid {
    display:grid; grid-template-columns:1.4fr 1fr; gap:18px; margin-bottom:18px;
  }
  .charts-grid-2 {
    display:grid; grid-template-columns:1fr 1fr; gap:18px;
  }
  @media(max-width:1100px){ .charts-grid, .charts-grid-2 { grid-template-columns:1fr; } }

  .chart-panel {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 22px;
    transition: all 0.25s ease;
  }
  .chart-panel:hover {
    background: var(--bg-card-hover);
  }
  .chart-header {
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .chart-header .icon { font-size:16px; }
  .chart-title {
    font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px;
    color: var(--text-primary);
  }
  .chart-wrap { position:relative; width:100%; }

  /* CARDS PROFISSIONAIS */
  .section-title {
    font-size:14px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px;
    color: var(--text-secondary); margin: 30px 0 16px; padding-bottom:10px;
    border-bottom: 1px solid var(--border-subtle);
    display:flex; align-items:center; gap:10px;
  }
  .prof-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(270px, 1fr)); gap:16px;
  }
  .prof-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);

    position:relative; overflow:hidden;
    transition: all 0.25s ease;
  }
  .prof-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
  }

  .rank-2::before { background: linear-gradient(90deg, #c0c0c0, #e0e0e0); }
  .rank-3::before { background: linear-gradient(90deg, #cd7f32, #ff9e40); }
  .rank-other::before { background: var(--cyan); }

  .prof-header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .prof-name {
    font-size:14px; font-weight:800; color: var(--text-primary);

  .prof-rank {

  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(100,120,255,0.3); border-radius:10px; }
</style>
</head>

let filteredData = [...rawData];
let currentPeriod = 'all';

// ============ FORMATAÇÃO ============
const fmtBRL = v => 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtInt = v => Number(v).toLocaleString('pt-BR');
const fmtPct = (a,b) => b===0 ? '0,00%' : ((a/b)*100).toFixed(2).replace('.',',') + '%';
const fmtNum = v => Number(v).toFixed(2).replace('.',',');

// ============ FILTROS ============
function applyPeriod(period){
  currentPeriod = period;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-period="${period}"]`).classList.add('active');

  const labels = { all:'todos os períodos', '1-10':'01 a 10 de junho', '11-20':'11 a 20 de junho', '21-30':'21 a 30 de junho' };
  document.getElementById('periodLabel').textContent = labels[period];

  filteredData = rawData.filter(r=>{
    const dia = parseInt(r.dt.slice(8));
    if(period==='1-10') return dia<=10;
    if(period==='11-20') return dia>=11 && dia<=20;
    if(period==='21-30') return dia>=21;
    return true;
  });
  updateAll();
}
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click', ()=>applyPeriod(b.dataset.period));
});

// ============ KPIs ============
function updateKPIs(){
  const total = filteredData.length;
  const valorTotal = filteredData.reduce((s,r)=>s+r.valor,0);
  const entradaTotal = filteredData.reduce((s,r)=>s+r.entrada,0);
  const efetivaTotal = filteredData.reduce((s,r)=>s+r.efetiva,0);
  const ativos = filteredData.filter(r=>r.status==='ATIVO').length;
  const cancelados = filteredData.filter(r=>r.status==='CANCELADO').length;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-header">💰 Valor Total Negociado</div>
      <div class="kpi-value kpi-cyan"><span class="currency">R$</span>${fmtBRL(valorTotal).replace('R$ ','')}</div>
      <div class="kpi-desc">${fmtInt(total)} contratos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header">💳 Total da Entrada</div>
      <div class="kpi-value kpi-green"><span class="currency">R$</span>${fmtBRL(entradaTotal).replace('R$ ','')}</div>
      <div class="kpi-desc">${fmtPct(entradaTotal,valorTotal)} do negociado</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header">✅ Entrada Efetiva</div>
      <div class="kpi-value kpi-purple"><span class="currency">R$</span>${fmtBRL(efetivaTotal).replace('R$ ','')}</div>
      <div class="kpi-desc">${fmtPct(efetivaTotal,valorTotal)} do negociado · ${fmtPct(efetivaTotal,entradaTotal)} da entrada</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header">🟢 Contratos Ativos</div>
      <div class="kpi-value kpi-orange">${fmtInt(ativos)}</div>
      <div class="kpi-desc">${fmtPct(ativos,total)} do total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header">🔴 Cancelados</div>
      <div class="kpi-value kpi-pink">${fmtInt(cancelados)}</div>
      <div class="kpi-desc">${fmtPct(cancelados,total)} do total</div>
    </div>
  `;
}

// ============ GRÁFICOS ============
function updateCharts(){
  // 1. ENTRADA EFETIVA POR CLOSER — PERCENTUAL
  const closerMap = {};
  filteredData.forEach(r=>{
    if(!closerMap[r.closer]) closerMap[r.closer] = { efetiva:0, valor:0 };
    closerMap[r.closer].efetiva += r.efetiva;
    closerMap[r.closer].valor += r.valor;
  });
  const closerPct = Object.entries(closerMap)
    .map(([nome,d])=>({ nome, pct: d.valor ? (d.efetiva/d.valor)*100 : 0 }))
    .sort((a,b)=>b.pct-a.pct);

  const ctx1 = document.getElementById('chartCloser').getContext('2d');
  if(chartCloserInst) chartCloserInst.destroy();
  chartCloserInst = new Chart(ctx1,{
    type:'bar',
    data:{
      labels: closerPct.map(e=>e.nome),
      datasets:[{
        label:'% Entrada Efetiva',
        data: closerPct.map(e=>e.pct),
        backgroundColor: closerPct.map((e,i)=>
          i===0 ? 'rgba(180,77,255,0.85)' :  // Daniel Marcos no print roxo
          i===1 ? 'rgba(0,240,255,0.85)' :    // Luis Alves cyan
          i===2 ? 'rgba(0,230,118,0.85)' :    // Rutemberg verde
          `hsla(${200 + i*40}, 70%, 55%, 0.85)`
        ),
        borderColor: closerPct.map((e,i)=>
          i===0 ? 'rgba(180,77,255,1)' : i===1 ? 'rgba(0,240,255,1)' : i===2 ? 'rgba(0,230,118,1)' : `hsla(${200 + i*40}, 70%, 55%, 1)`
        ),
        borderWidth:1, borderRadius:8, borderSkipped:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true, aspectRatio:1.8,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{label:(c)=> c.raw.toFixed(2).replace('.',',') + '%'},
          backgroundColor:'rgba(17,24,39,0.95)'
        }
      },
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:11},maxRotation:35},grid:{display:false}},
        y:{
          ticks:{color:'#94a3b8',font:{size:11},callback:v=>v.toFixed(0)+'%'},
          grid:{color:'rgba(255,255,255,0.04)'},
          beginAtZero:true,
          title:{display:true,text:'% Entrada Efetiva',color:'#64748b',font:{size:11}}
        }
      }
    }
  });

  // 2. DISTRIBUIÇÃO POR STATUS (donut)
  const ativos = filteredData.filter(r=>r.status==='ATIVO').length;
  const cancelados = filteredData.filter(r=>r.status==='CANCELADO').length;
  const ctx2 = document.getElementById('chartStatus').getContext('2d');
  if(chartStatusInst) chartStatusInst.destroy();
  chartStatusInst = new Chart(ctx2,{
    type:'doughnut',
    data:{
      labels:['Ativos ('+ativos+')','Cancelados ('+cancelados+')'],
      datasets:[{
        data:[ativos,cancelados],
        backgroundColor:['rgba(0,230,118,0.75)','rgba(255,77,138,0.7)'],
        borderColor:['rgba(0,230,118,1)','rgba(255,77,138,1)'],
        borderWidth:2, hoverBorderWidth:3,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{
        legend:{position:'bottom',labels:{color:'#e2e8f0',padding:14,font:{size:12},usePointStyle:true}},
        tooltip:{backgroundColor:'rgba(17,24,39,0.95)'}
      }
    }
  });

  // 3. ENTRADA EFETIVA POR DIA
  const diaMap = {};
  filteredData.forEach(r=>{
    const dia = parseInt(r.dt.slice(8));
    const label = dia.toString().padStart(2,'0') + '/06';
    if(!diaMap[label]) diaMap[label]=0;
    diaMap[label]+=r.efetiva;
  });
  const diasSorted = Object.entries(diaMap).sort((a,b)=>a[0].localeCompare(b[0]));

  const ctx3 = document.getElementById('chartDia').getContext('2d');
  if(chartDiaInst) chartDiaInst.destroy();
  chartDiaInst = new Chart(ctx3,{
    type:'bar',
    data:{
      labels: diasSorted.map(e=>e[0]),
      datasets:[{
        label:'Entrada Efetiva',
        data: diasSorted.map(e=>e[1]),
        backgroundColor:'rgba(0,240,255,0.75)',
        borderColor:'rgba(0,240,255,1)',
        borderWidth:1, borderRadius:6, borderSkipped:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true, aspectRatio:2,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:(c)=>fmtBRL(c.raw)},backgroundColor:'rgba(17,24,39,0.95)'}
      },
      scales:{
        x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#94a3b8',callback:v=>'R$ '+(v/1000).toFixed(0)+'k'},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });

  // 4. ENTRADA EFETIVA POR PROMOTOR
  const promMap = {};
  filteredData.forEach(r=>{
    if(!promMap[r.promotor]) promMap[r.promotor]=0;
    promMap[r.promotor]+=r.efetiva;
  });
  const promSorted = Object.entries(promMap).sort((a,b)=>b[1]-a[1]);

  const ctx4 = document.getElementById('chartPromotor').getContext('2d');
  if(chartPromotorInst) chartPromotorInst.destroy();
  chartPromotorInst = new Chart(ctx4,{
    type:'bar',
    indexAxis:'y',
    data:{
      labels: promSorted.map(e=>e[0]),
      datasets:[{
        label:'Entrada Efetiva',
        data: promSorted.map(e=>e[1]),
        backgroundColor:'rgba(0,240,255,0.75)',
        borderColor:'rgba(0,240,255,1)',
        borderWidth:1, borderRadius:6, borderSkipped:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true, aspectRatio:1.3,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:(c)=>fmtBRL(c.raw)},backgroundColor:'rgba(17,24,39,0.95)'}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',callback:v=>'R$ '+(v/1000).toFixed(0)+'k'},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{display:false}}
      }
    }
  });
}

// ============ CARDS POR PROFISSIONAL ============
function buildProfCards(key, containerId){
  const map = {};
  filteredData.forEach(r=>{
    const name = r[key];
    if(!map[name]) map[name]={valor:0,entrada:0,efetiva:0,ativos:0,cancelados:0,total:0};
    map[name].valor+=r.valor;
    map[name].entrada+=r.entrada;
    map[name].efetiva+=r.efetiva;
    map[name].total++;
    if(r.status==='ATIVO') map[name].ativos++; else map[name].cancelados++;
  });

  const sorted = Object.entries(map).sort((a,b)=>b[1].efetiva-a[1].efetiva);
  const container = document.getElementById(containerId);
  if(sorted.length===0){
    container.innerHTML='<div style="color:var(--text-muted);padding:20px;">Nenhum registro.</div>';
    return;
  }

  container.innerHTML = sorted.map(([name,d],i)=>{
    const rank = i+1;
    const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-other';
    const rankLabel = rank<=3 ? `${rank}º` : `${rank}º`;
    const pctEfetiva = d.valor?((d.efetiva/d.valor)*100).toFixed(2).replace('.',','):'0,00';
    const pctEntrada = d.valor?((d.entrada/d.valor)*100).toFixed(2).replace('.',','):'0,00';
    const taxaConv = d.total?((d.ativos/d.total)*100).toFixed(0):'0';

    return `
      <div class="prof-card ${rankClass}">
        <div class="prof-header">
          <div class="prof-name" title="${name}">${name}</div>
          <div class="prof-rank">${rankLabel}</div>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">💰 Negociado</span>
          <span class="prof-metric-value cyan">${fmtBRL(d.valor)}</span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">💳 Entrada</span>
          <span class="prof-metric-value orange">${fmtBRL(d.entrada)} <small style="color:var(--text-muted);font-weight:400;">(${pctEntrada}%)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">✅ Efetiva</span>
          <span class="prof-metric-value green">${fmtBRL(d.efetiva)} <small style="color:var(--text-muted);font-weight:400;">(${pctEfetiva}%)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">📊 Contratos</span>
          <span class="prof-metric-value purple">${d.total} <small style="color:var(--text-muted);font-weight:400;">(${d.ativos}A · ${d.cancelados}C)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">🎯 Conversão</span>
          <span class="prof-metric-value" style="color:${taxaConv>=70?'var(--green)':taxaConv>=50?'var(--orange)':'var(--pink)'};">${taxaConv}%</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============ UPDATE GERAL ============
function updateAll(){
  updateKPIs();
  updateCharts();
  buildProfCards('closer','closerGrid');
  buildProfCards('liner','linerGrid');
  buildProfCards('promotor','promotorGrid');
}

// ============ INIT ============
updateAll();
</script>
