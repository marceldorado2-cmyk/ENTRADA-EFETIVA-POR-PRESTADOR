<style>
  :root {
    --bg-main: #0a0e1a;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --border-subtle: rgba(255,255,255,0.06);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --cyan: #06b6d4;
    --cyan-glow: rgba(6,182,212,0.3);
    --orange: #f97316;
    --orange-glow: rgba(249,115,22,0.3);
    --green: #10b981;
    --green-glow: rgba(16,185,129,0.3);
    --purple: #a855f7;
    --purple-glow: rgba(168,85,247,0.3);
    --yellow: #eab308;
    --yellow-glow: rgba(234,179,8,0.3);
    --pink: #ec4899;
    --pink-glow: rgba(236,72,153,0.3);
    --red: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-main);
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(6,182,212,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(16,185,129,0.04) 0%, transparent 50%);
    font-family: 'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 32px;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;
    margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle);
  }
  .header-brand { display:flex; align-items:center; gap:14px; }
  .logo-icon {
    width:46px; height:46px; border-radius:10px;
    background: linear-gradient(135deg, #06b6d4, #10b981);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    box-shadow: 0 0 20px rgba(6,182,212,0.3);
  }
  .title-block h1 {
    font-size:24px; font-weight:700; color:#f1f5f9; letter-spacing:-0.5px;
  }
  .title-block span {
    font-size:12px; color: var(--text-muted); letter-spacing:0.3px;
  }
  .live-badge {
    padding:8px 18px; border-radius:30px; font-size:12px; font-weight:700;
    letter-spacing:1.5px; border:1px solid rgba(16,185,129,0.5);
    background:rgba(16,185,129,0.1); color:var(--green);
    display:flex; align-items:center; gap:8px;
  }
  .live-badge::before {
    content:''; width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.4; }
  }

  /* FILTERS */
  .filter-bar {
    display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:28px;
  }
  .filter-row {
    display:flex; gap:8px; flex-wrap:wrap; justify-content:center; align-items:center;
  }
  .filter-label {
    font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); font-weight:600;
  }
  .filter-btn {
    padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600;
    background: rgba(255,255,255,0.04); border:1px solid var(--border-subtle);
    color: var(--text-secondary); cursor:pointer; transition:all 0.2s;
    font-family:inherit;
  }
  .filter-btn:hover {
    background: rgba(255,255,255,0.08); color: var(--text-primary);
  }
  .filter-btn.active {
    background: rgba(6,182,212,0.15); border-color: var(--cyan); color: var(--cyan);
  }
  .filter-status {
    font-size:12px; color: var(--text-muted);
  }
  .filter-status strong { color: var(--cyan); font-weight:600; }
  .filter-select {
    padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500;
    background: rgba(255,255,255,0.04); border:1px solid var(--border-subtle);
    color: var(--text-primary); cursor:pointer; font-family:inherit; outline:none;
  }
  .filter-select option { background:#111827; }

  /* KPI CARDS GRID */
  .kpi-grid {
    display:grid; grid-template-columns:repeat(5, 1fr); gap:16px; margin-bottom:16px;
  }
  .kpi-grid-2 {
    display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:32px;
  }
  @media(max-width:1200px){ .kpi-grid { grid-template-columns:repeat(3,1fr); } .kpi-grid-2 { grid-template-columns:repeat(2,1fr); } }
  @media(max-width:768px){ .kpi-grid, .kpi-grid-2 { grid-template-columns:1fr; } }

  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px 22px;
    position:relative; overflow:hidden;
    transition: all 0.25s ease;
  }
  .kpi-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .kpi-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
  }
  .kpi-card.border-cyan::before { background: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }
  .kpi-card.border-orange::before { background: var(--orange); box-shadow: 0 0 12px var(--orange-glow); }
  .kpi-card.border-green::before { background: var(--green); box-shadow: 0 0 12px var(--green-glow); }
  .kpi-card.border-purple::before { background: var(--purple); box-shadow: 0 0 12px var(--purple-glow); }
  .kpi-card.border-yellow::before { background: var(--yellow); box-shadow: 0 0 12px var(--yellow-glow); }
  .kpi-card.border-pink::before { background: var(--pink); box-shadow: 0 0 12px var(--pink-glow); }
  .kpi-card.border-red::before { background: var(--red); box-shadow: 0 0 12px rgba(239,68,68,0.3); }

  .kpi-icon { font-size:22px; margin-bottom:10px; }
  .kpi-label {
    font-size:10px; text-transform:uppercase; letter-spacing:1.5px;
    color: var(--text-muted); font-weight:600; margin-bottom:8px;
  }
  .kpi-value {
    font-size:28px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px;
  }
  .kpi-value.cyan { color: var(--cyan); }
  .kpi-value.orange { color: var(--orange); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.purple { color: var(--purple); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-value.pink { color: var(--pink); }
  .kpi-value.red { color: var(--red); }
  .kpi-desc {
    font-size:11px; color: var(--text-muted); line-height:1.4;
  }
  .kpi-formula {
    font-size:10px; color: var(--text-muted); font-style:italic; margin-top:4px; opacity:0.7;
  }

  /* SECTION TITLE */
  .section-title {
    font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;
    color: var(--text-secondary); margin: 32px 0 16px; padding-bottom:10px;
    border-bottom: 1px solid var(--border-subtle);
    display:flex; align-items:center; gap:10px;
  }
  .section-title .count {
    font-size:11px; color: var(--text-muted); font-weight:500; text-transform:none; letter-spacing:0;
  }

  /* PROFESSIONAL CARDS */
  .prof-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; margin-bottom:24px;
  }
  .prof-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 18px 20px;
    position:relative; overflow:hidden;
    transition: all 0.25s ease;
  }
  .prof-card:hover {
    background: var(--bg-card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .prof-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
  }
  .prof-card.rank-1::before { background: linear-gradient(90deg, #eab308, #f59e0b); box-shadow: 0 0 12px var(--yellow-glow); }
  .prof-card.rank-2::before { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
  .prof-card.rank-3::before { background: linear-gradient(90deg, #d97706, #f59e0b); }
  .prof-card.rank-other::before { background: var(--cyan); box-shadow: 0 0 12px var(--cyan-glow); }

  .prof-header {
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }
  .prof-name {
    font-size:14px; font-weight:700; color: var(--text-primary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:70%;
  }
  .prof-rank {
    font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;
    letter-spacing:0.5px;
  }
  .rank-1 .prof-rank { background:rgba(234,179,8,0.15); color:var(--yellow); border:1px solid rgba(234,179,8,0.3); }
  .rank-2 .prof-rank { background:rgba(148,163,184,0.15); color:#cbd5e1; border:1px solid rgba(148,163,184,0.3); }
  .rank-3 .prof-rank { background:rgba(217,119,6,0.15); color:#f59e0b; border:1px solid rgba(217,119,6,0.3); }
  .rank-other .prof-rank { background:rgba(6,182,212,0.1); color:var(--cyan); border:1px solid rgba(6,182,212,0.25); }

    display:flex; justify-content:space-between; align-items:center;
    padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .prof-metric:last-child { border-bottom:none; }
  .prof-metric-label {
    font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); font-weight:600;
  }
  .prof-metric-value {
    font-size:13px; font-weight:700; color:var(--text-primary);

  .prof-metric-value.green { color:var(--green); }
  .prof-metric-value.orange { color:var(--orange); }
  .prof-metric-value.purple { color:var(--purple); }

    display:grid; grid-template-columns:1.5fr 1fr; gap:16px; margin-bottom:32px;

  .chart-panel {

    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-panel h3 {
    font-size:12px; text-transform:uppercase; letter-spacing:1.5px;
    color: var(--text-secondary); margin-bottom:16px; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .chart-wrap { position:relative; width:100%; }

  /* TABS */
  .tabs {
    display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap;
  }
  .tab-btn {
    padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600;
    background: rgba(255,255,255,0.04); border:1px solid var(--border-subtle);
    color: var(--text-muted); cursor:pointer; transition:all 0.2s;
    font-family:inherit; text-transform:uppercase; letter-spacing:0.5px;
  }
  .tab-btn:hover { color:var(--text-primary); background:rgba(255,255,255,0.08); }
  .tab-btn.active {
    background: rgba(6,182,212,0.15); border-color:var(--cyan); color:var(--cyan);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { height:6px; width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(100,120,255,0.3); border-radius:10px; }
</style>
</head>

function applyPeriod(period){
  currentPeriod = period;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-period="${period}"]`).classList.add('active');

  const labels = { all:'todos os períodos', '1-10':'01 a 10 de junho', '11-20':'11 a 20 de junho', '21-30':'21 a 30 de junho' };
  document.getElementById('periodLabel').textContent = labels[period];

  applyFilters();
}

function applyFilters(){
  const closer = document.getElementById('filterCloser').value;
  const liner = document.getElementById('filterLiner').value;
  const promotor = document.getElementById('filterPromotor').value;
  const status = document.getElementById('filterStatus').value;

  filteredData = rawData.filter(r=>{
    if(currentPeriod==='1-10' && parseInt(r.dt.slice(8))>10) return false;
    if(currentPeriod==='11-20' && (parseInt(r.dt.slice(8))<11 || parseInt(r.dt.slice(8))>20)) return false;
    if(currentPeriod==='21-30' && parseInt(r.dt.slice(8))<21) return false;
    if(closer && r.closer!==closer) return false;
    if(liner && r.liner!==liner) return false;
    if(promotor && r.promotor!==promotor) return false;
    if(status && r.status!==status) return false;
    return true;
  });
  updateAll();
}

});

  b.addEventListener('click', ()=>applyPeriod(b.dataset.period));
});

// ============ KPIs GERAIS ============
function updateKPIs(){
  const total = filteredData.length;
  const valorTotal = filteredData.reduce((s,r)=>s+r.valor,0);
  const entradaTotal = filteredData.reduce((s,r)=>s+r.entrada,0);
  const efetivaTotal = filteredData.reduce((s,r)=>s+r.efetiva,0);
  const ativos = filteredData.filter(r=>r.status==='ATIVO').length;
  const cancelados = filteredData.filter(r=>r.status==='CANCELADO').length;
  const mediaPctEntrada = filteredData.length ? (filteredData.reduce((s,r)=>s+(r.entrada/r.valor*100),0)/filteredData.length) : 0;
  const mediaEfetiva = filteredData.length ? (filteredData.reduce((s,r)=>s+(r.efetiva/r.valor*100),0)/filteredData.length) : 0;
  const taxaConversao = filteredData.length ? (ativos/filteredData.length*100) : 0;

  // Linha 1 - 5 cards
  document.getElementById('kpiGrid1').innerHTML = `
    <div class="kpi-card border-cyan">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label">Total de Cotas</div>
      <div class="kpi-value cyan">${fmtInt(total)}</div>
      <div class="kpi-desc">registros no período</div>
    </div>
    <div class="kpi-card border-orange">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">Valor Total (Σ)</div>
      <div class="kpi-value orange">${fmtBRL(valorTotal)}</div>
      <div class="kpi-desc">soma do valor negociado</div>
      <div class="kpi-formula">fórmula: SOMA(valor)</div>
    </div>
    <div class="kpi-card border-green">
      <div class="kpi-icon">🔑</div>
      <div class="kpi-label">Média % Entrada</div>
      <div class="kpi-value green">${fmtNum(mediaPctEntrada)}%</div>
      <div class="kpi-desc">média da coluna % entrada</div>
      <div class="kpi-formula">fórmula: MÉDIA(entrada/valor)</div>
    </div>
    <div class="kpi-card border-purple">
      <div class="kpi-icon"></div>
      <div class="kpi-label">Média Entrada Efetiva %</div>
      <div class="kpi-value purple">${fmtNum(mediaEfetiva)}%</div>
      <div class="kpi-desc">média da % entrada efetiva</div>
      <div class="kpi-formula">fórmula: MÉDIA(efetiva/valor)</div>
    </div>
    <div class="kpi-card border-yellow">
      <div class="kpi-icon">⚡</div>
      <div class="kpi-label">% Entrada Efetiva (H÷B)</div>
      <div class="kpi-value yellow">${fmtPct(efetivaTotal, valorTotal)}</div>
      <div class="kpi-desc">SOMA(efetiva) ÷ SOMA(valor) × 100</div>
      <div class="kpi-formula">fórmula: SOMA(H)/SOMA(B)</div>
    </div>
  `;

  // Linha 2 - 4 cards
  document.getElementById('kpiGrid2').innerHTML = `
    <div class="kpi-card border-orange">
      <div class="kpi-icon">💳</div>
      <div class="kpi-label">Total Entrada</div>
      <div class="kpi-value orange">${fmtBRL(entradaTotal)}</div>
      <div class="kpi-desc">soma das entradas</div>
      <div class="kpi-formula">fórmula: SOMA(entrada)</div>
    </div>
    <div class="kpi-card border-cyan">
      <div class="kpi-icon">✅</div>
      <div class="kpi-label">Total Entrada Efetiva</div>
      <div class="kpi-value cyan">${fmtBRL(efetivaTotal)}</div>
      <div class="kpi-desc">soma das entradas efetivas</div>
      <div class="kpi-formula">fórmula: SOMA(efetiva)</div>
    </div>
    <div class="kpi-card border-green">
      <div class="kpi-icon">🟢</div>
      <div class="kpi-label">Contratos Ativos</div>
      <div class="kpi-value green">${fmtInt(ativos)}</div>
      <div class="kpi-desc">${fmtPct(ativos,total)} do total · taxa de conversão</div>
      <div class="kpi-formula">fórmula: CONT.SE(status="ATIVO")</div>
    </div>
    <div class="kpi-card border-red">
      <div class="kpi-icon">🔴</div>
      <div class="kpi-label">Contratos Cancelados</div>
      <div class="kpi-value red">${fmtInt(cancelados)}</div>
      <div class="kpi-desc">${fmtPct(cancelados,total)} do total</div>
      <div class="kpi-formula">fórmula: CONT.SE(status="CANCELADO")</div>
    </div>
  `;
}

// ============ GRÁFICOS ============
function updateCharts(){
  // Top 10 clientes por valor
  const clienteMap = {};
  filteredData.forEach(r=>{
    if(!clienteMap[r.cliente]) clienteMap[r.cliente]=0;
    clienteMap[r.cliente]+=r.valor;
  });
  const clienteSorted = Object.entries(clienteMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const ctx1 = document.getElementById('chartCliente').getContext('2d');
  if(chartClienteInst) chartClienteInst.destroy();
  chartClienteInst = new Chart(ctx1,{
    type:'bar',
    data:{
      labels: clienteSorted.map(e=>e[0].split(' ').slice(0,2).join(' ')),
      datasets:[{
        data: clienteSorted.map(e=>e[1]),
        backgroundColor:'rgba(16,185,129,0.7)',
        borderColor:'rgba(16,185,129,1)',
        borderWidth:1, borderRadius:6, borderSkipped:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true, aspectRatio:2.2,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:(c)=>fmtBRL(c.raw)},backgroundColor:'rgba(17,24,39,0.95)'}
      },
      scales:{
        x:{ticks:{color:'#94a3b8',size:10,maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#94a3b8',callback:(v)=>'R$ '+(v/1000).toFixed(0)+'k',size:10},grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });

  // Status donut
  const ativosEf = filteredData.filter(r=>r.status==='ATIVO').reduce((s,r)=>s+r.efetiva,0);
  const cancEf = filteredData.filter(r=>r.status==='CANCELADO').reduce((s,r)=>s+r.efetiva,0);
  const ctx2 = document.getElementById('chartStatus').getContext('2d');
  if(chartStatusInst) chartStatusInst.destroy();
  chartStatusInst = new Chart(ctx2,{
    type:'doughnut',
    data:{
      labels:['Ativos','Cancelados'],
      datasets:[{
        data:[ativosEf,cancEf],
        backgroundColor:['rgba(16,185,129,0.75)','rgba(239,68,68,0.65)'],
        borderColor:['rgba(16,185,129,1)','rgba(239,68,68,1)'],
        borderWidth:2, hoverBorderWidth:3,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{
        legend:{position:'bottom',labels:{color:'#e2e8f0',padding:14,font:{size:11},usePointStyle:true}},
        tooltip:{callbacks:{label:(c)=>fmtBRL(c.raw)+' ('+fmtPct(c.raw,ativosEf+cancEf)+')'},backgroundColor:'rgba(17,24,39,0.95)'}
      }
    }
  });
}

// ============ CARDS POR PROFISSIONAL ============
function buildProfCards(key, containerId, countId){
  const map = {};
  filteredData.forEach(r=>{
    const name = r[key];
    if(!map[name]) map[name]={valor:0,entrada:0,efetiva:0,ativos:0,cancelados:0,total:0};
    map[name].valor+=r.valor;
    map[name].entrada+=r.entrada;
    map[name].efetiva+=r.efetiva;
    map[name].total++;
    if(r.status==='ATIVO') map[name].ativos++;
    else map[name].cancelados++;
  });

  const sorted = Object.entries(map).sort((a,b)=>b[1].efetiva-a[1].efetiva);
  document.getElementById(countId).textContent = `(${sorted.length} profissionais)`;

  const container = document.getElementById(containerId);
  if(sorted.length===0){
    container.innerHTML='<div style="color:var(--text-muted);padding:20px;">Nenhum registro.</div>';
    return;
  }

  container.innerHTML = sorted.map(([name,d],i)=>{
    const rank = i+1;
    const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-other';
    const rankLabel = rank<=3 ? `🏆 ${rank}º` : `${rank}º`;
    const pctEfetiva = d.valor?((d.efetiva/d.valor)*100).toFixed(2).replace('.',','):'0,00';
    const pctEntrada = d.valor?((d.entrada/d.valor)*100).toFixed(2).replace('.',','):'0,00';
    const taxaConv = d.total?((d.ativos/d.total)*100).toFixed(0):'0';

    return `
      <div class="prof-card ${rankClass}">
        <div class="prof-header">
          <div class="prof-name" title="${name}">${name}</div>
          <div class="prof-rank">${rankLabel}</div>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">💰 Negociado</span>
          <span class="prof-metric-value cyan">${fmtBRL(d.valor)}</span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">💳 Entrada</span>
          <span class="prof-metric-value orange">${fmtBRL(d.entrada)} <small style="color:var(--text-muted);font-weight:400;">(${pctEntrada}%)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">✅ Efetiva</span>
          <span class="prof-metric-value green">${fmtBRL(d.efetiva)} <small style="color:var(--text-muted);font-weight:400;">(${pctEfetiva}%)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">📊 Contratos</span>
          <span class="prof-metric-value purple">${d.total} <small style="color:var(--text-muted);font-weight:400;">(${d.ativos}A · ${d.cancelados}C)</small></span>
        </div>
        <div class="prof-metric">
          <span class="prof-metric-label">🎯 Conversão</span>
          <span class="prof-metric-value" style="color:${taxaConv>=70?'var(--green)':taxaConv>=50?'var(--yellow)':'var(--red)'};">${taxaConv}%</span>
        </div>
      </div>
    `;
  }).join('');
}

// ============ UPDATE GERAL ============
function updateAll(){
  updateKPIs();
  updateCharts();
  buildProfCards('closer','closerGrid','closerCount');
  buildProfCards('liner','linerGrid','linerCount');
  buildProfCards('promotor','promotorGrid','promotorCount');
}

// ============ INIT ============
populateFilters();
updateAll();
</script>
